<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Dinner Menu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .menu-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 1000px; }
        .day-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .day-name { font-weight: bold; color: #333; border-bottom: 2px solid #ffcc00; margin-bottom: 10px; text-transform: uppercase; }
        .meal-name { color: #555; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="menu-container" id="menu">
    <p>Loading dinner...</p>
</div>
<script>
    // 1. PASTE YOUR SHEET ID HERE
    const sheetId = '1VLDlBu3U1_guQTpsMYjnlcVsxmewhtKMr15uAc8AtnA';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchMeals() {
        console.log("Attempting to fetch data...");
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.text();
            console.log("Data received:", data);

            const rows = data.split('\n').slice(1);
            const menuElement = document.getElementById('menu');

            let htmlContent = '';

            rows.forEach(row => {
                // This regex handles commas inside quotes correctly
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const day = cols[0].replace(/"/g, "").trim();
                    const meal = cols[1].replace(/"/g, "").trim();

                    htmlContent += `
                        <div class="day-card">
                            <div class="day-name">${day}</div>
                            <div class="meal-name">${meal}</div>
                        </div>
                    `;
                }
            });

            menuElement.innerHTML = htmlContent || "Sheet is empty or formatted incorrectly.";

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('menu').innerHTML = `
                <div style="color: red;">
                    <b>Error:</b> Could not reach Google Sheets.<br>
                    <small>Check the console (F12) for details.</small>
                </div>`;
        }
    }

    // Run the function when the page loads
    window.onload = fetchMeals;
</script>

</body>
</html>
