<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chalkboard Dinner Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Text color: A creamy off-white, softer than pure white */
            --chalk-main: #f9f9f9; 
            /* Accent color: A pale, vintage blue chalk */
            --chalk-accent: #aed9e0; 
            /* Background: A very dark slate color */
            --slate-bg: #2c3e50; 
        }

        body { 
            font-family: 'Special Elite', 'Courier New', Courier, monospace; 
            background-color: var(--slate-bg);
            /* Add a subtle texture to the slate background */
            background-image: url('https://www.transparenttextures.com/patterns/dark-dot-2.png');
            color: var(--chalk-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 50px;
            font-weight: 300;
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--chalk-accent);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3); /* Subtle depth on the title */
            border-bottom: 2px dashed var(--chalk-main);
            padding-bottom: 15px;
        }

        /* Container: We switch from a grid to a single flex column */
        .menu-container { 
            display: flex;
            flex-direction: column;
            width: 100%; 
            max-width: 900px; /* Narrower for a list format */
            gap: 0; /* Removing the gap so the cards connect to the chalk line */
        }

        /* Card: Removing shadows, background, and grid borders */
        .day-card { 
            background: transparent;
            padding: 30px 15px;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            /* We replace the border-left with a large border-bottom (the chalk line) */
            border-bottom: 3px dashed rgba(255, 255, 255, 0.4); 
            width: 100%;
            position: relative;
        }

        /* Remove the chalk line from the very last item */
        .day-card:last-of-type {
            border-bottom: none;
        }

        .day-name { 
            font-size: 1rem;
            font-weight: 400; 
            color: var(--chalk-accent); 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        .meal-name { 
            color: var(--chalk-main); 
            font-size: 2.2rem; /* Larger meal name for easy viewing */
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 5px;
        }
        
        .meal-notes {
            color: var(--chalk-accent);
            font-size: 1rem;
            font-style: italic;
            margin-top: 15px;
            /* Notes get their own small section, still without borders */
            border-top: 1px dotted rgba(255,255,255,0.2);
            padding-top: 15px;
            opacity: 0.8;
        }

        /* Mobile optimization: Making text smaller so it doesn't wrap awkwardly */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .meal-name { font-size: 1.6rem; }
            .day-card { padding: 20px 10px; }
        }
    </style>
    
</head>
    
<body>

    <h1>DINNER MENU</h1>

    <div class="menu-container" id="menu">
        <div class="day-card" style="border: none;">
            <div class="meal-name">Prepping the slate...</div>
        </div>
    </div>

<script>
    // 1. PASTE YOUR SHEET ID HERE
    const sheetId = '1VLDlBu3U1_guQTpsMYjnlcVsxmewhtKMr15uAc8AtnA';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchMeals() {
        console.log("Attempting to fetch data...");
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.text();
            console.log("Data received:", data);

            const rows = data.split('\n').slice(1);
            const menuElement = document.getElementById('menu');

            let htmlContent = '';

            rows.forEach(row => {
                // This regex handles commas inside quotes correctly
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const day = cols[0].replace(/"/g, "").trim();
                    const meal = cols[1].replace(/"/g, "").trim();
                    const notes = cols[2] ? cols[2].replace(/"/g, "").trim() : "";

                    htmlContent += `
                        <div class="day-card">
                            <div class="day-name">${day}</div>
                            <div class="meal-name">${meal}</div>
                             <div class="meal-notes">${notes}</div>
                        </div>
                    `;
                }
            });

            menuElement.innerHTML = htmlContent || "Sheet is empty or formatted incorrectly.";

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('menu').innerHTML = `
                <div style="color: red;">
                    <b>Error:</b> Could not reach Google Sheets.<br>
                    <small>Check the console (F12) for details.</small>
                </div>`;
        }
    }

    // Run the function when the page loads
    window.onload = fetchMeals;
</script>
</body>
</html>
