<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chalkboard Dinner Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --chalk-main: #f9f9f9; 
            --chalk-accent: #aed9e0; 
            --slate-bg: #2c3e50; 
        }

        body { 
            font-family: 'Special Elite', sans-serif; 
            background-color: var(--slate-bg);
            background-image: url('https://www.transparenttextures.com/patterns/dark-dot-2.png');
            color: var(--chalk-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--chalk-accent);
            border-bottom: 2px dashed var(--chalk-main);
            padding-bottom: 10px;
        }

        /* 2x4 Grid Setup */
        .menu-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Exactly 2 columns */
            grid-template-rows: repeat(4, auto); /* Exactly 4 rows */
            gap: 0; /* Removing gap to use internal borders for a "grid line" look */
            width: 100%; 
            max-width: 1000px;
            border: 2px solid rgba(255,255,255,0.3); /* Outer chalkboard frame */
        }

        .day-card { 
            background: transparent;
            padding: 25px;
            border: 1px dashed rgba(255, 255, 255, 0.2); /* Chalk grid lines */
            display: flex;
            flex-direction: column;
            min-height: 150px;
        }

        .day-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
        }

        .day-name { 
            font-size: 0.9rem;
            color: var(--chalk-accent); 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        .day-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .meal-name { 
            font-size: 1.6rem; 
            line-height: 1.2;
            margin-bottom: 5px;
        }
        
        .meal-notes {
            color: var(--chalk-accent);
            font-size: 0.85rem;
            font-style: italic;
            margin-top: auto; /* Pushes notes to the bottom of the card */
            padding-top: 10px;
            opacity: 0.7;
        }

        /* Mobile Fix: Stack into 1 column so it's readable on phones */
        @media (max-width: 700px) {
            .menu-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
        }
    </style>
</head>
    
<body>

    <h1>Dinner Menu</h1>

    <div class="menu-container" id="menu">
        </div>

<script>
    const sheetId = '1VLDlBu3U1_guQTpsMYjnlcVsxmewhtKMr15uAc8AtnA';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

   async function fetchMeals() {
    try {
        const response = await fetch(url);
        const data = await response.text();
        
        const rows = data.split('\n').slice(1).filter(row => row.trim() !== "");
        const menuElement = document.getElementById('menu');

        let htmlContent = '';
        let generalNote = ""; // We'll store the note here

        rows.forEach((row, index) => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length >= 2) {
                const day = cols[0].replace(/"/g, "").trim();
                const meal = cols[1].replace(/"/g, "").trim();
                const notes = cols[2] ? cols[2].replace(/"/g, "").trim() : "";
                const date = cols[3] ? cols[3].replace(/"/g, "").trim() : "";
                
                // Grab the General Note from Column E (index 4) of the very first row
                if (index === 0 && cols[4]) {
                    generalNote = cols[4].replace(/"/g, "").trim();
                }

                htmlContent += `
                    <div class="day-card">
                        <div class="day-header">
                            <span class="day-name">${day}</span>
                            ${date ? `<span class="day-date">— ${date}</span>` : ''}
                        </div>
                        <div class="meal-name">${meal}</div>
                        ${notes ? `<div class="meal-notes">${notes}</div>` : ''}
                    </div>
                `;
            }
        });

        // The 8th Box: Now displays your General Note
        htmlContent += `
            <div class="day-card" style="border: 2px solid var(--chalk-accent);">
                <div class="day-name" style="color: var(--chalk-main); border-bottom: 1px solid var(--chalk-accent); margin-bottom: 10px;">
                    Notes
                </div>
                <div class="meal-notes" style="border: none; font-size: 1.1rem; color: var(--chalk-main); opacity: 1;">
                    ${generalNote || "No extra notes this week!"}
                </div>
            </div>`;

        menuElement.innerHTML = htmlContent;

    } catch (error) {
        document.getElementById('menu').innerHTML = "Error loading menu.";
    }
}

    window.onload = fetchMeals;
</script>
</body>
</html>
