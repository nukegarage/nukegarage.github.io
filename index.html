<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chalkboard Dinner Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --chalk-main: #f9f9f9; 
            --chalk-accent: #aed9e0; 
            --slate-bg: #2c3e50; 
        }

        body { 
            font-family: 'Special Elite', sans-serif; 
            background-color: var(--slate-bg);
            background-image: url('https://www.transparenttextures.com/patterns/dark-dot-2.png');
            color: var(--chalk-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--chalk-accent);
            border-bottom: 2px dashed var(--chalk-main);
            padding-bottom: 10px;
        }

        .menu-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: repeat(4, auto); 
            gap: 0; 
            width: 100%; 
            max-width: 1000px;
            border: 2px solid rgba(255,255,255,0.3); 
        }

        .day-card { 
            background: transparent;
            padding: 25px;
            border: 1px dashed rgba(255, 255, 255, 0.2); 
            display: flex;
            flex-direction: column;
            min-height: 180px; /* Slightly taller for extra notes */
        }

        .day-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
        }

        .day-name { 
            font-size: 0.9rem;
            color: var(--chalk-accent); 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        .day-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .meal-name { 
            font-size: 1.6rem; 
            line-height: 1.2;
            margin-bottom: 2px;
        }
        
        /* Styled as a list item */
        .meal-notes {
            color: var(--chalk-accent);
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.8;
            margin-top: 2px;
            padding-top: 0px;
            padding-left: 12px;
            position: relative;
        }

        .meal-notes::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--chalk-main);
        }

                /* Styled as a list item */
        .gen-notes {
            color: var(--chalk-accent);
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 4px;
            padding-left: 12px;
            position: relative;
        }
        
        @media (max-width: 700px) {
            .menu-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
        }
    </style>
</head>
    
<body>

    <h1>Dinner Menu</h1>

    <div class="menu-container" id="menu"></div>
<script>
    const sheetId = '1VLDlBu3U1_guQTpsMYjnlcVsxmewhtKMr15uAc8AtnA';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchMeals() {
        try {
            const response = await fetch(url);
            const data = await response.text();
            
            const rows = data.split('\n').slice(1).filter(row => row.trim() !== "");
            const menuElement = document.getElementById('menu');

            let htmlContent = '';
            let allGeneralNotes = []; // Array to hold notes from H2 through H8

            rows.forEach((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const day = cols[0].replace(/"/g, "").trim();
                    const date = cols[1] ? cols[1].replace(/"/g, "").trim() : "";
                    const meal = cols[2].replace(/"/g, "").trim();
                    const notes0 = cols[3] ? cols[3].replace(/"/g, "").trim() : "";
                    const notes1 = cols[4] ? cols[4].replace(/"/g, "").trim() : "";
                    const notes2 = cols[5] ? cols[5].replace(/"/g, "").trim() : "";
                    const notes3 = cols[6] ? cols[6].replace(/"/g, "").trim() : "";
                    const notes4 = cols[7] ? cols[7].replace(/"/g, "").trim() : "";
                    const notes5 = cols[8] ? cols[8].replace(/"/g, "").trim() : "";
                    
                    // NEW: Collect notes from Column J (index ) for every row
                    if (cols[9] && cols[9].replace(/"/g, "").trim() !== "") {
                        allGeneralNotes.push(cols[9].replace(/"/g, "").trim());
                    }

                    htmlContent += `
                        <div class="day-card">
                            <div class="day-header">
                                <span class="day-name">${day}</span>
                                ${date ? `<span class="day-date">— ${date}</span>` : ''}
                            </div>
                            <div class="meal-name">${meal}</div>
                            <div style="margin-top: 5px;">
                                ${notes0 ? `<div class="meal-notes">${notes0}</div>` : ''}
                                ${notes1 ? `<div class="meal-notes">${notes1}</div>` : ''}
                                ${notes2 ? `<div class="meal-notes">${notes2}</div>` : ''}
                                ${notes3 ? `<div class="meal-notes">${notes3}</div>` : ''}
                                ${notes4 ? `<div class="meal-notes">${notes4}</div>` : ''}
                                ${notes5 ? `<div class="meal-notes">${notes5}</div>` : ''}
                            </div>
                        </div>
                    `;
                }
            });

            // Convert the array of notes into a bulleted list for the 8th box
            const notesListHtml = allGeneralNotes.length > 0 
                ? allGeneralNotes.map(note => `<div class="gen-notes" style="color: var(--chalk-main); opacity: 1;">${note}</div>`).join('')
                : "No extra notes!";

            // 8th Box with General Note
            htmlContent += `
                <div class="day-card" style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center;">
                    <div class="day-name" style="font-size: 1.4rem; color: var(--chalk-accent); border-bottom: 1px solid var(--chalk-accent); margin-bottom: 10px">
                        Upcoming
                    </div>
                    <div style="font-size: 1rem; line-height: 1.4;">
                        ${notesListHtml}
                    </div>
                </div>`;

            menuElement.innerHTML = htmlContent;

            // 300000 milliseconds = 5 minutes
            setTimeout(fetchMeals, 300000); 
            console.log("Timer set: Refreshing in 5 minutes...");

        } catch (error) {
            document.getElementById('menu').innerHTML = "Error loading menu.";
        }
    }

    window.onload = fetchMeals;
</script>
</body>
</html>
