<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Dinner Menu</title>
<style>
    :root {
        --primary: #2d3436;
        --accent: #0984e3;
        --bg: #dfe6e9;
        --card-bg: #ffffff;
    }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background-color: var(--bg);
        color: var(--primary);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px;
    }

    h1 {
        margin-bottom: 30px;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 3px solid var(--accent);
        padding-bottom: 10px;
    }

    .menu-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 20px; 
        width: 100%; 
        max-width: 1200px; 
    }

    .day-card { 
        background: var(--card-bg); 
        padding: 25px; 
        border-radius: 15px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        transition: transform 0.2s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 5px solid var(--accent);
    }

    .day-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .day-name { 
        font-size: 0.9rem;
        font-weight: 800; 
        color: var(--accent); 
        margin-bottom: 8px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }

    .meal-name { 
        color: var(--primary); 
        font-size: 1.4rem; 
        font-weight: 500;
        line-height: 1.2;
    }

    /* Mobile optimization */
    @media (max-width: 600px) {
        .menu-container {
            grid-template-columns: 1fr;
        }
        h1 { font-size: 1.5rem; }
    }
</style>
</head>
    
<body>

    <h1>Weekly Dinner Menu</h1>

    <div class="menu-container" id="menu">
        <div class="day-card">
            <div class="meal-name">Fetching the menu...</div>
        </div>
    </div>

<script>
    // 1. PASTE YOUR SHEET ID HERE
    const sheetId = '1VLDlBu3U1_guQTpsMYjnlcVsxmewhtKMr15uAc8AtnA';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchMeals() {
        console.log("Attempting to fetch data...");
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.text();
            console.log("Data received:", data);

            const rows = data.split('\n').slice(1);
            const menuElement = document.getElementById('menu');

            let htmlContent = '';

            rows.forEach(row => {
                // This regex handles commas inside quotes correctly
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const day = cols[0].replace(/"/g, "").trim();
                    const meal = cols[1].replace(/"/g, "").trim();

                    htmlContent += `
                        <div class="day-card">
                            <div class="day-name">${day}</div>
                            <div class="meal-name">${meal}</div>
                        </div>
                    `;
                }
            });

            menuElement.innerHTML = htmlContent || "Sheet is empty or formatted incorrectly.";

        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('menu').innerHTML = `
                <div style="color: red;">
                    <b>Error:</b> Could not reach Google Sheets.<br>
                    <small>Check the console (F12) for details.</small>
                </div>`;
        }
    }

    // Run the function when the page loads
    window.onload = fetchMeals;
</script>
</body>
    
</html>
